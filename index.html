const COLORS = ["#2563eb","#7c3aed","#059669","#d97706","#dc2626","#0891b2","#6366f1","#be185d","#ea580c","#4f46e5","#0d9488","#c026d3"];
const fmt = n => "$" + (n||0).toLocaleString("en-US", {maximumFractionDigits:0});

function getItemLookup() {
  const m = {};
  state.priceList.forEach(i => { m[i.id] = i; });
  return m;
}

function getRoomTotal(rn) {
  const lookup = getItemLookup();
  return (state.editableItems[rn]||[]).reduce((s,i) => {
    const match = state.priceList.find(p => p.name === i.item_type) || {};
    const pf = match.perFt || i.pricePerFt || 0;
    const pu = match.perUnit || i.pricePerUnit || 0;
    return s + pf * (i.lineal_feet||0) + pu * (i.quantity||0);
  }, 0);
}
function getGrandTotal() { return Object.keys(state.editableItems).reduce((s,r) => s + getRoomTotal(r), 0); }

// ═══════════════════════════════════════════════
// AI PROMPTS
// ═══════════════════════════════════════════════
const SYSTEM_PROMPT = `You are an expert cabinet estimator for a high-end custom cabinet shop. You analyze architectural floor plans and identify every location where cabinetry would be installed.

Return ONLY valid JSON. No markdown. No backticks. No text before or after the JSON object.
Use simple ASCII characters only in all string values. No em-dashes, curly quotes, or special unicode.

Required JSON structure:
{"project":"name","rooms":[{"room":"room name","items":[{"id":"b1","ft":10,"qty":3,"note":"reason"}]}],"note":"overall note"}

Rules:
- id field: ONLY use item codes from the provided list (b1, b2, u1, t6, etc)
- ft field: lineal feet as a number, round to nearest 0.5
- qty field: integer count of units/cabinets
- note field: under 50 chars, plain ASCII, no quote characters inside
- Be thorough: every room that could have cabinets should be included
- Include base cabs, uppers, sink bases, appliance cabs, end panels, hoods, specialty hardware, crown molding, countertops, built-ins, pantries, vanities
- Use realistic residential dimensions (typical kitchen base run is 8-15 ft per wall)
- For appliance markers (DW, REFRIG, RANGE, OVEN), include relevant appliance panels and cabinet types
- For built-in markers, include bookshelves or open shelving
- Include crown molding and countertops for rooms with cabinets`;

function buildUserPrompt() {
  const itemList = state.priceList.map(i => `${i.id}: ${i.name} ($${i.perFt}/ft, $${i.perUnit}/unit)`).join("\n");
  return `Analyze this floor plan image carefully. Look at every room label, dimension marking, appliance symbol, and cabinet indicator. Identify every cabinet opportunity.

${state.extraContext ? "Additional context: " + state.extraContext : ""}

ITEM CODES - use these in the id field:
${itemList}

Be thorough and realistic. This is a high-end custom residential project.`;
}

// ═══════════════════════════════════════════════
// API CALL
// ═══════════════════════════════════════════════
async function runAnalysis() {
  if (!state.uploadedImage || !state.apiKey) { if(!state.apiKey){state.error='Please enter your API key first.';render();} return; }
  state.stage = 'analyzing';
  state.error = null;
  render();

  try {
    const img = state.uploadedImage;
    const isPdf = img.mediaType === 'application/pdf';
    const contentBlock = isPdf
      ? { type:"document", source:{ type:"base64", media_type:"application/pdf", data:img.base64 } }
      : { type:"image", source:{ type:"base64", media_type:img.mediaType, data:img.base64 } };

    const resp = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{ "Content-Type":"application/json", "x-api-key": state.apiKey, "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-access":"true" },
      body: JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:4000,
        system: SYSTEM_PROMPT,
        messages:[{ role:"user", content:[contentBlock, { type:"text", text:buildUserPrompt() }] }],
      }),
    });

    const data = await resp.json();
    if (data.error) throw new Error(data.error.message || "API error");
    if (data.type === 'error') throw new Error(JSON.stringify(data));

    const text = (data.content||[]).map(b => b.type==='text' ? b.text : '').join('');
    let clean = text.replace(/```json|```/g,'').trim();
    const fb = clean.indexOf('{'), lb = clean.lastIndexOf('}');
    if (fb===-1||lb===-1) throw new Error("No JSON found in response");
    clean = clean.substring(fb, lb+1);
    clean = clean.replace(/,\s*([}\]])/g,'$1');
    clean = clean.replace(/[\u201C\u201D]/g,'"').replace(/[\u2018\u2019\u2013\u2014]/g,'-');
    clean = clean.replace(/[\x00-\x1F\x7F]/g,' ');

    let parsed;
    try { parsed = JSON.parse(clean); }
    catch { parsed = JSON.parse(clean.replace(/"note"\s*:\s*"[^"]*"/g,'"note":""')); }

    const lookup = getItemLookup();
    const analysis = {
      project_name: parsed.project || img.fileName || "Project",
      notes: parsed.note || "",
      rooms: (parsed.rooms||[]).map(room => ({
        room_name: room.room || "Unknown",
        cabinet_items: (room.items||[]).map(item => {
          const match = lookup[item.id];
          const ft = parseFloat(item.ft)||0;
          const qty = parseInt(item.qty)||0;
          return {
            item_type: match?.name || item.id, lineal_feet: ft, quantity: qty,
            pricePerFt: match?.perFt||0, pricePerUnit: match?.perUnit||0,
            totalPrice: (match?.perFt||0)*ft + (match?.perUnit||0)*qty,
            matched: !!match, notes: item.note||'',
          };
        }),
      })),
    };

    state.analysis = analysis;
    state.editableItems = {};
    analysis.rooms.forEach(r => { state.editableItems[r.room_name] = r.cabinet_items.map(i => ({...i})); });
    state.stage = 'reviewed';
  } catch(err) {
    // Friendly error messages
    let msg = err.message || 'Analysis failed';
    if (msg.includes('exceeded_limit') || msg.includes('rate_limit')) msg = 'API rate limit reached. Please wait a few minutes and try again.';
    else if (msg.includes('invalid x-api-key') || msg.includes('authentication')) msg = 'Invalid API key. Please check your key in Settings.';
    else if (msg.includes('Could not process image') || msg.includes('Could not process document')) msg = 'Could not read this file. Try a clearer image or different format (PNG/JPG work best).';
    state.error = msg;
    state.stage = 'error';
  }
  render();
}

function resetAll() {
  state.stage = 'upload'; state.uploadedImage = null; state.extraContext = '';
  state.analysis = null; state.error = null; state.selectedRoom = null;
  state.editableItems = {}; state.expandedRooms = {};
  render();
}

// ═══════════════════════════════════════════════
// FILE HANDLING
// ═══════════════════════════════════════════════
function processFile(file) {
  if (!file) return;
  const valid = ['image/png','image/jpeg','image/webp','image/gif','application/pdf'];
  if (!valid.includes(file.type)) { state.error = 'Upload PNG, JPG, WebP, GIF, or PDF.'; render(); return; }
  if (file.size > 20*1024*1024) { state.error = 'File too large (max 20MB).'; render(); return; }
  state.error = null;
  const reader = new FileReader();
  reader.onload = () => {
    state.uploadedImage = { dataUrl: reader.result, base64: reader.result.split(',')[1], mediaType: file.type, fileName: file.name };
    render();
  };
  reader.readAsDataURL(file);
}

}

function renderResults() {
  const a = state.analysis;
  if (!a) return '';

  // Build floor plan SVG
  const rooms = a.rooms;
  const n = rooms.length;
  const cols = n<=2?2:n<=4?2:3;
  const rows = Math.ceil(n/cols);
  const svgW = 600, svgH = Math.max(400, rows*155+100);
  const cellW = (svgW-80)/cols, cellH = (svgH-100)/rows;
  const pad = 8;

  let svg = `<svg viewBox="0 0 ${svgW} ${svgH}" style="width:100%;max-width:560px;height:auto">
    <defs>
      <pattern id="rg" width="12" height="12" patternUnits="userSpaceOnUse"><path d="M 12 0 L 0 0 0 12" fill="none" stroke="#1a2332" stroke-width="0.3"/></pattern>
      <pattern id="rgl" width="60" height="60" patternUnits="userSpaceOnUse"><path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1e293b" stroke-width="0.4"/></pattern>
    </defs>
    <rect width="${svgW}" height="${svgH}" fill="#0d1117" rx="6"/>
    <rect width="${svgW}" height="${svgH}" fill="url(#rg)" rx="6"/>
    <rect width="${svgW}" height="${svgH}" fill="url(#rgl)" rx="6"/>
    <text x="${svgW/2}" y="28" text-anchor="middle" fill="#475569" font-size="10" font-weight="600" font-family="monospace" letter-spacing="2">${esc((a.project_name||'PROJECT').toUpperCase())} — CABINET ESTIMATE</text>
    <rect x="30" y="45" width="${svgW-60}" height="${svgH-80}" fill="none" stroke="#334155" stroke-width="2" rx="2"/>`;

  rooms.forEach((room, ri) => {
    const col = ri%cols, row = Math.floor(ri/cols);
    const x = 40+col*cellW, y = 55+row*cellH;
    const w = cellW-pad*2, h = cellH-pad*2;
    const color = COLORS[ri%COLORS.length];
    const total = getRoomTotal(room.room_name);
    const items = state.editableItems[room.room_name]||[];
    const totalFt = items.reduce((s,i) => s+(i.lineal_feet||0), 0);
    const itemCount = items.length;
    const isActive = state.selectedRoom === room.room_name;
    const num = ri+1;

    svg += `<g class="room-click" data-room="${esc(room.room_name)}" style="cursor:pointer">`;
    svg += `<rect x="${x+pad}" y="${y+pad}" width="${w-pad}" height="${h-pad}" fill="${isActive?color+'18':color+'08'}" stroke="${color}" stroke-width="${isActive?2:1}" rx="3"/>`;

    // Cabinet lines
    const hasBase = items.some(i => (i.item_type||'').toLowerCase().match(/base|sink/));
    const hasUpper = items.some(i => (i.item_type||'').toLowerCase().match(/upper|hood/));
    const hasTall = items.some(i => (i.item_type||'').toLowerCase().match(/tower|pantry|shelf/));
    if (hasBase) { const len = Math.min(w*0.8,Math.max(w*0.3,(totalFt/30)*w)); svg += `<line x1="${x+pad+4}" y1="${y+h-4}" x2="${x+pad+4+len}" y2="${y+h-4}" stroke="${color}" stroke-width="4" opacity="0.35" stroke-linecap="round"/>`; }
    if (hasUpper) { const len = Math.min(w*0.7,Math.max(w*0.25,(totalFt/40)*w)); svg += `<line x1="${x+pad+4}" y1="${y+4}" x2="${x+pad+4+len}" y2="${y+4}" stroke="${color}" stroke-width="3" opacity="0.35" stroke-linecap="round"/>`; }
    if (hasTall) { const len = Math.min(h*0.5,Math.max(h*0.2,30)); svg += `<line x1="${x+w-4}" y1="${y+pad+4}" x2="${x+w-4}" y2="${y+pad+4+len}" stroke="${color}" stroke-width="4" opacity="0.35" stroke-linecap="round"/>`; }

    // Number badge
    svg += `<circle cx="${x+pad+14}" cy="${y+pad+14}" r="11" fill="${color}" opacity="0.9"/>`;
    svg += `<text x="${x+pad+14}" y="${y+pad+18}" text-anchor="middle" fill="white" font-size="11" font-weight="700" font-family="monospace">${num}</text>`;

    // Room name
    svg += `<text x="${x+w/2+pad/2}" y="${y+h/2-2}" text-anchor="middle" fill="${color}" font-size="${n>6?9:11}" font-weight="700" font-family="monospace">${esc(room.room_name.toUpperCase())}</text>`;
    svg += `<text x="${x+w/2+pad/2}" y="${y+h/2+12}" text-anchor="middle" fill="#475569" font-size="7.5" font-family="monospace">${itemCount} items · ${Math.round(totalFt)} lin ft</text>`;

    // Price bubble
    if (total > 0) {
      svg += `<rect x="${x+w/2-32+pad/2}" y="${y+h-pad-26}" width="64" height="20" rx="10" fill="#0f172a" stroke="#22c55e" stroke-width="1" opacity="0.95"/>`;
      svg += `<text x="${x+w/2+pad/2}" y="${y+h-pad-13}" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="700" font-family="monospace">${fmt(total)}</text>`;
    }
    svg += `</g>`;
  });

  svg += `<text x="40" y="${svgH-18}" fill="#334155" font-size="7.5" font-family="monospace">Click a room to expand details</text>`;
  svg += `<text x="${svgW-40}" y="${svgH-18}" text-anchor="end" fill="#22c55e" font-size="8" font-weight="700" font-family="monospace">TOTAL: ${fmt(getGrandTotal())}</text>`;
  svg += `</svg>`;

  // Thumbnail
  let thumb = '';
  if (state.uploadedImage && state.uploadedImage.mediaType !== 'application/pdf') {
    thumb = `<div style="padding:10px 14px;border-bottom:1px solid var(--border3);display:flex;align-items:center;gap:10px;background:#0a0f1a">
      <img src="${state.uploadedImage.dataUrl}" style="width:48px;height:48px;object-fit:cover;border-radius:4px;border:1px solid var(--border3)">
      <div><div style="font-size:10px;color:var(--text2);font-weight:600">${esc(state.uploadedImage.fileName)}</div><div style="font-size:9px;color:var(--text4)">Original upload</div></div>
    </div>`;
  }

  // Line items
  let lineItems = `<div style="padding:9px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg3);z-index:10">
    <div style="font-size:10px;color:var(--text2);font-weight:600">${rooms.length} ROOMS &middot; ${Object.values(state.editableItems).flat().length} ITEMS</div>
  </div>`;

  rooms.forEach((room, ri) => {
    const items = state.editableItems[room.room_name]||[];
    const roomTotal = getRoomTotal(room.room_name);
    const isExpanded = state.expandedRooms[room.room_name];
    const color = COLORS[ri%COLORS.length];

    lineItems += `<div style="border-bottom:1px solid var(--border3);background:${state.selectedRoom===room.room_name?'rgba(37,99,235,0.04)':'transparent'}">
      <div class="room-toggle" data-room="${esc(room.room_name)}" style="padding:9px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="width:18px;height:18px;border-radius:50%;background:${color};display:flex;align-items:center;justify-content:center;flex-shrink:0">
            <span style="font-size:10px;font-weight:700;color:white">${ri+1}</span>
          </div>
          <span style="font-size:11px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:0.03em">${esc(room.room_name)}</span>
          <span style="font-size:9px;color:var(--text4)">${items.length} items</span>
          <span style="font-size:9px;color:var(--border2)">${isExpanded?'▾':'▸'}</span>
        </div>
        <div style="font-size:13px;font-weight:700;color:${roomTotal>0?'var(--green)':'var(--text4)'}">${fmt(roomTotal)}</div>
      </div>`;

    if (isExpanded) {
      lineItems += `<div style="padding:0 16px 9px"><table style="width:100%;border-collapse:collapse;font-size:9.5px">
        <tr style="color:var(--text4)">
          <th style="text-align:left;padding:2px 0;font-weight:600;width:38%">Item</th>
          <th style="text-align:right;padding:2px 0;font-weight:600;width:12%">Ft</th>
          <th style="text-align:right;padding:2px 0;font-weight:600;width:10%">Qty</th>
          <th style="text-align:right;padding:2px 0;font-weight:600;width:12%">$/Ft</th>
          <th style="text-align:right;padding:2px 0;font-weight:600;width:16%">Total</th>
          <th style="width:12%"></th>
        </tr>`;
      items.forEach((item, ii) => {
        const match = state.priceList.find(p => p.name === item.item_type) || {};
        const pf = match.perFt || item.pricePerFt || 0;
        const pu = match.perUnit || item.pricePerUnit || 0;
        const t = pf*(item.lineal_feet||0) + pu*(item.quantity||0);
        let opts = state.priceList.map(p => `<option value="${esc(p.name)}" ${p.name===item.item_type?'selected':''}>${esc(p.name)}</option>`).join('');
        lineItems += `<tr style="border-top:1px solid var(--border3)">
          <td style="padding:4px 0"><select class="item-select" data-room="${esc(room.room_name)}" data-idx="${ii}" style="background:var(--bg4);color:var(--text);border:1px solid var(--border2);border-radius:3px;padding:2px;font-size:9px;width:100%">${opts}</select></td>
          <td style="text-align:right"><input type="number" step="0.5" min="0" class="item-ft input-sm" data-room="${esc(room.room_name)}" data-idx="${ii}" value="${item.lineal_feet||''}" style="width:40px"></td>
          <td style="text-align:right"><input type="number" step="1" min="0" class="item-qty input-sm" data-room="${esc(room.room_name)}" data-idx="${ii}" value="${item.quantity||''}" style="width:32px"></td>
          <td style="text-align:right;color:var(--text3)">${fmt(pf)}</td>
          <td style="text-align:right;color:var(--green);font-weight:600">${fmt(t)}</td>
          <td style="text-align:right"><button class="item-remove" data-room="${esc(room.room_name)}" data-idx="${ii}" style="background:none;border:none;color:var(--text4);cursor:pointer;font-size:11px;padding:1px 3px">x</button></td>
        </tr>`;
      });
      lineItems += `</table><button class="item-add btn" data-room="${esc(room.room_name)}" style="font-size:9px;margin-top:5px;border-style:dashed;color:var(--text4)">+ Add item</button></div>`;
    }
    lineItems += `</div>`;
  });

  // Grand total
  lineItems += `<div style="padding:14px 16px;border-top:2px solid var(--border);background:linear-gradient(135deg,#0f2a1a,#0a1a2f);position:sticky;bottom:0">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div><div style="font-size:9px;color:var(--text3);letter-spacing:0.1em;font-weight:600">TOTAL ESTIMATE</div><div style="font-size:8px;color:var(--text4);margin-top:1px">${esc(a.project_name)}</div></div>
      <div style="text-align:right"><div style="font-size:24px;font-weight:700;color:var(--green)">${fmt(getGrandTotal())}</div>
      <div style="font-size:8px;color:var(--text4)">Range: ${fmt(Math.round(getGrandTotal()*0.94))} - ${fmt(Math.round(getGrandTotal()*1.1))}</div></div>
    </div>
    ${a.notes ? `<div style="margin-top:8px;padding:7px 9px;background:rgba(37,99,235,0.08);border:1px solid var(--border);border-radius:4px;font-size:9px;color:var(--text2);line-height:1.5"><span style="color:#60a5fa;font-weight:700">AI NOTE:</span> ${esc(a.notes)}</div>` : ''}
  </div>`;

  return `<div style="display:flex;height:calc(100vh - 110px)">
    <div style="flex:1 1 50%;overflow:auto;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column">
      ${thumb}
      <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:20px">${svg}</div>
    </div>
    <div style="flex:1 1 50%;overflow:auto;background:var(--bg3)">${lineItems}</div>
  </div>`;
}

// ═══════════════════════════════════════════════
// EVENT HANDLING
// ═══════════════════════════════════════════════
function attachEvents() {
  // Tabs
  document.querySelectorAll('[data-tab]').forEach(el => {
    el.addEventListener('click', () => { state.activeTab = el.dataset.tab; render(); });
  });

  // Settings
  const saveBtn = document.getElementById('saveKeyBtn');
  if (saveBtn) saveBtn.addEventListener('click', () => {
    const key = document.getElementById('apiKeyInput').value.trim();
    if (key) { state.apiKey = key; state.apiKeySet = true; state.activeTab = 'estimate'; }
    render();
  });

  // Inline key save (on upload page)
  const inlineSave = document.getElementById('inlineSaveKey');
  if (inlineSave) inlineSave.addEventListener('click', () => {
    const key = document.getElementById('inlineKeyInput').value.trim();
    if (key) { state.apiKey = key; state.apiKeySet = true; }
    render();
  });
  const inlineInput = document.getElementById('inlineKeyInput');
  if (inlineInput) inlineInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') { const key = inlineInput.value.trim(); if(key){state.apiKey=key;state.apiKeySet=true;render();} }
  });

  // API key enter
  const keyInput = document.getElementById('apiKeyInput');
  if (keyInput) keyInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') { const key = keyInput.value.trim(); if(key){state.apiKey=key;state.apiKeySet=true;state.activeTab='estimate';render();} }
  });

  // File input
  const fi = document.getElementById('fileInput');
  if (fi) fi.addEventListener('change', e => processFile(e.target.files[0]));

  // Drop zone
  const dz = document.getElementById('dropZone');
  if (dz) {
    dz.addEventListener('dragover', e => { e.preventDefault(); dz.style.borderColor='var(--blue)'; });
    dz.addEventListener('dragleave', () => { dz.style.borderColor = state.uploadedImage?'var(--green)':'var(--border2)'; });
    dz.addEventListener('drop', e => { e.preventDefault(); processFile(e.dataTransfer.files[0]); });
    if (!state.uploadedImage) dz.addEventListener('click', () => fi && fi.click());
  }

  // Browse buttons
  const bb2 = document.getElementById('browseBtn2');
  if (bb2) bb2.addEventListener('click', e => { e.stopPropagation(); fi && fi.click(); });

  // Replace button
  const rb = document.getElementById('replaceBtn');
  if (rb) rb.addEventListener('click', e => { e.stopPropagation(); state.uploadedImage=null; state.error=null; render(); setTimeout(()=>{const f=document.getElementById('fileInput');if(f)f.click();},50); });

  // Context
  const ci = document.getElementById('contextInput');
  if (ci) ci.addEventListener('input', () => { state.extraContext = ci.value; });

  // Analyze
  const ab = document.getElementById('analyzeBtn');
  if (ab) ab.addEventListener('click', runAnalysis);

  // Retry / Start Over
  const retryBtn = document.getElementById('retryBtn');
  if (retryBtn) retryBtn.addEventListener('click', runAnalysis);
  const soBtn = document.getElementById('startOverBtn');
  if (soBtn) soBtn.addEventListener('click', () => { resetAll(); });

  // Price editor
  document.querySelectorAll('.price-input').forEach(el => {
    el.addEventListener('change', () => {
      const item = state.priceList.find(i => i.id === el.dataset.id);
      if (item) item[el.dataset.field] = parseFloat(el.value)||0;
    });
  });
  const rpb = document.getElementById('resetPricesBtn');
  if (rpb) rpb.addEventListener('click', () => { state.priceList = JSON.parse(JSON.stringify(DEFAULT_PRICE_LIST)); render(); });

  // Room toggles (in results)
  document.querySelectorAll('.room-toggle').forEach(el => {
    el.addEventListener('click', () => {
      const rn = el.dataset.room;
      state.selectedRoom = rn;
      state.expandedRooms[rn] = !state.expandedRooms[rn];
      render();
    });
  });

  // SVG room clicks
  document.querySelectorAll('.room-click').forEach(el => {
    el.addEventListener('click', () => {
      const rn = el.dataset.room;
      state.selectedRoom = rn;
      state.expandedRooms[rn] = true;
      render();
    });
  });

  // Line item edits
  document.querySelectorAll('.item-select').forEach(el => {
    el.addEventListener('change', () => {
      const rn = el.dataset.room, idx = parseInt(el.dataset.idx);
      const items = state.editableItems[rn];
      if (!items || !items[idx]) return;
      items[idx].item_type = el.value;
      const match = state.priceList.find(p => p.name === el.value);
      if (match) { items[idx].pricePerFt = match.perFt; items[idx].pricePerUnit = match.perUnit; }
      render();
    });
  });
  document.querySelectorAll('.item-ft').forEach(el => {
    el.addEventListener('change', () => {
      const items = state.editableItems[el.dataset.room];
      if (items && items[el.dataset.idx]) { items[el.dataset.idx].lineal_feet = parseFloat(el.value)||0; render(); }
    });
  });
  document.querySelectorAll('.item-qty').forEach(el => {
    el.addEventListener('change', () => {
      const items = state.editableItems[el.dataset.room];
      if (items && items[el.dataset.idx]) { items[el.dataset.idx].quantity = parseInt(el.value)||0; render(); }
    });
  });
  document.querySelectorAll('.item-remove').forEach(el => {
    el.addEventListener('click', () => {
      const items = state.editableItems[el.dataset.room];
      if (items) { items.splice(parseInt(el.dataset.idx),1); render(); }
    });
  });
  document.querySelectorAll('.item-add').forEach(el => {
    el.addEventListener('click', () => {
      const rn = el.dataset.room;
      if (!state.editableItems[rn]) state.editableItems[rn] = [];
      state.editableItems[rn].push({ item_type:"Base Cabinet - full height doors", lineal_feet:3, quantity:1, pricePerFt:450, pricePerUnit:0, totalPrice:1350, matched:true, notes:"Manually added" });
      render();
    });
  });
}

function esc(s) { if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Initial render
render();
</script>
</body>
</html>
